name: Visual QA Monitor

on:
  schedule:
    # Daily at 5 AM ET (9 AM UTC) — before Director (7 AM) and PM (6 PM)
    - cron: "0 9 * * *"
  workflow_dispatch: # Allow manual triggering

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      issues: write
      contents: write # for committing VQS index and coordination log

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Production build is much more reliable than dev in CI — no Turbopack
      # on-demand compilation, no hydration races. Slightly slower to start
      # but pages render fully on first request.
      - name: Build app (production)
        run: NODE_ENV=production npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      - name: Start production server
        run: |
          npm run start &
          echo $! > /tmp/server.pid
          # Wait for server to respond with a real page (not 500 / not empty)
          for i in {1..30}; do
            BODY=$(curl -s http://localhost:3000/demo || true)
            # Look for a marker that confirms the page actually rendered
            if echo "$BODY" | grep -q "data-section-type\|Velocity\|Strata Demo"; then
              echo "Server ready after $i seconds"
              break
            fi
            echo "Attempt $i: not ready yet..."
            sleep 2
          done
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      - name: Run VQA Monitor
        # Use --demo-only in CI: the /eval/[fixture] dynamic route has path
        # resolution issues when process.cwd() differs from the fixtures
        # generation path. Demo artifact is hardcoded and always renders.
        run: npx tsx scripts/eval/vqa-monitor.ts --demo-only
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill $(cat /tmp/server.pid) || true
          fi

      - name: Commit VQA artifacts
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/vqa/ docs/agents/vqa/ docs/agents/coordination-log.md scripts/eval/screenshots/golden-baselines.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "vqa: daily report $(date +%Y-%m-%d)"
            git push origin main
          else
            echo "No VQA artifacts to commit"
          fi

name: Visual QA Monitor

on:
  schedule:
    # Daily at 5 AM ET (9 AM UTC) — before Director (7 AM) and PM (6 PM)
    - cron: "0 9 * * *"
  workflow_dispatch: # Allow manual triggering

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      issues: write
      contents: write # for committing VQS index and coordination log

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start dev server
        run: |
          npm run dev &
          echo $! > /tmp/dev.pid
          # Wait for server to be ready
          for i in {1..30}; do
            if curl -s -o /dev/null http://localhost:3000/demo; then
              echo "Dev server ready after $i seconds"
              break
            fi
            sleep 1
          done
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      - name: Run VQA Monitor
        run: npx tsx scripts/eval/vqa-monitor.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Stop dev server
        if: always()
        run: |
          if [ -f /tmp/dev.pid ]; then
            kill $(cat /tmp/dev.pid) || true
          fi

      - name: Commit VQA artifacts
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/vqa/ docs/agents/vqa/ docs/agents/coordination-log.md scripts/eval/screenshots/golden-baselines.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "vqa: daily report $(date +%Y-%m-%d)"
            git push origin main
          else
            echo "No VQA artifacts to commit"
          fi

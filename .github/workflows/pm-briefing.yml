name: PM Evening Briefing

on:
  schedule:
    - cron: '0 23 * * *'  # ~6 PM ET daily (23:00 UTC)
  workflow_dispatch: {}

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  pm-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --prefix scripts/pm-briefing

      - name: Generate briefing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          REPO_ROOT: ${{ github.workspace }}
        run: npx tsx src/runner.ts
        working-directory: scripts/pm-briefing

      - name: Commit briefing and state files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/briefings/ docs/agents/pm/ docs/agents/coordination-log.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            BRANCH="pm/briefing-$(date +%Y%m%d-%H%M%S)"
            git checkout -b "$BRANCH"
            git commit -m "PM Briefing: $(date +%Y-%m-%d)"
            git push -u origin "$BRANCH"
            gh pr create \
              --title "PM Briefing $(date +%Y-%m-%d)" \
              --label pm-briefing \
              --label tier-0 \
              --body "Automated evening product briefing. Markdown + coordination log only. Risk-free."
          fi
